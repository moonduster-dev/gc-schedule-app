<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GC Player Schedule Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    html { height: 100%; }
    body { height: 100%; min-height: -webkit-fill-available; display: flex; flex-direction: column; font-family: system-ui, sans-serif; }
    #main-area { flex: 1; overflow: auto; min-height: 0; }
    #chat-panel { border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    #chat-messages { overflow-y: auto; max-height: 200px; }
    .prose table { width: 100%; border-collapse: collapse; }
    .prose table td, .prose table th { border: 1px solid #e5e7eb; padding: 4px 8px; text-align: left; }
    .prose ul { padding-left: 1.25rem; list-style-type: disc; }
    .prose ol { padding-left: 1.25rem; list-style-type: decimal; }
    .prose p { margin-bottom: .5rem; }
    .prose strong { font-weight: 600; }
    .prose code { background:#f1f5f9;padding:1px 4px;border-radius:3px;font-size:.85em; }
    #schedule-table th { position: sticky; top: 0; z-index: 2; }
    .location-link { color: #2563eb; text-decoration: underline; cursor: pointer; }
    .location-link:hover { color: #1d4ed8; }
    input[type=date]::-webkit-calendar-picker-indicator { cursor:pointer; }
    .spinner { border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .row-highlight { background-color: #fef9c3 !important; }
  </style>
</head>
<body class="bg-gray-50">

<!-- ===== HEADER ===== -->
<header class="bg-blue-900 text-white px-5 py-3 flex items-center gap-4 shadow-lg flex-shrink-0">
  <div>
    <h1 class="text-xl font-bold leading-tight">GC Player Schedule Hub</h1>
    <p class="text-blue-300 text-sm">GC Player (&amp; Camper) Travel Softball Schedules</p>
  </div>
  <div class="ml-auto flex items-center gap-3">
    <span id="data-badge" class="text-sm px-2 py-1 rounded-full bg-blue-800 text-blue-200 border border-blue-700">Loading…</span>
    <span id="row-count" class="text-sm text-blue-300"></span>
  </div>
</header>

<!-- ===== FILTER BAR ===== -->
<div class="bg-white border-b shadow-sm px-4 py-2 flex-shrink-0 overflow-y-auto" style="max-height:30vh" id="filter-bar">
  <div class="flex items-center gap-2 flex-wrap">
    <label class="text-sm font-semibold text-gray-600 uppercase tracking-wide">Players</label>
    <div id="player-filters" class="flex flex-wrap gap-1.5"></div>
    <button onclick="clearPlayerFilter()" class="text-sm text-blue-600 hover:underline ml-1">All</button>
  </div>
  <div class="flex items-center gap-2 ml-auto">
    <label class="text-sm font-semibold text-gray-600 uppercase tracking-wide">From</label>
    <input type="date" id="date-from" class="text-sm border rounded px-2 py-1 focus:outline-blue-400">
    <label class="text-sm font-semibold text-gray-600 uppercase tracking-wide">To</label>
    <input type="date" id="date-to" class="text-sm border rounded px-2 py-1 focus:outline-blue-400">
    <button onclick="clearDateFilter()" class="text-sm text-blue-600 hover:underline">Clear</button>
  </div>
</div>

<!-- ===== CHAT PANEL (top) ===== -->
<div id="chat-panel" class="bg-white flex-shrink-0 flex flex-col">

  <!-- Message history (hidden until first answer) -->
  <div id="chat-messages-wrap" class="hidden">
    <div class="flex items-center px-4 py-1 bg-gray-50 border-b border-gray-100 cursor-pointer select-none" onclick="toggleChatHistory()">
      <svg class="w-3.5 h-3.5 text-gray-400 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3-3-3z"/></svg>
      <span class="text-xs text-gray-500 font-medium">Conversation</span>
      <span id="chat-toggle-icon" class="ml-auto text-xs text-gray-400">▲ hide</span>
    </div>
    <div id="chat-messages" class="px-4 py-2 space-y-2 bg-gray-50"></div>
  </div>

  <!-- Example chips -->
  <div id="chat-examples" class="px-4 py-2 flex flex-wrap gap-1.5 border-b border-gray-100">
    <span class="text-sm text-gray-400 self-center">Try:</span>
    <button onclick="exampleQ(this)" class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-full px-3 py-1">When does Sophia play next?</button>
    <button onclick="exampleQ(this)" class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-full px-3 py-1">What games are this weekend?</button>
    <button onclick="exampleQ(this)" class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-full px-3 py-1">Who plays on July 11?</button>
    <button onclick="exampleQ(this)" class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-full px-3 py-1">What teams play at nationals?</button>
    <button onclick="exampleQ(this)" class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-full px-3 py-1">GameChanger URL for Lady Jackets 16B?</button>
  </div>

  <!-- Always-visible input row -->
  <div class="px-3 py-2.5 flex gap-2 items-center">
    <input id="chat-input" type="text" placeholder="Ask about players, schedules, teams, or locations…"
      class="flex-1 text-base border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      onkeydown="if(event.key==='Enter')sendQuestion()">
    <button onclick="sendQuestion()" class="bg-blue-700 hover:bg-blue-800 text-white text-base font-medium px-5 py-2 rounded-lg transition">Ask</button>
    <span id="chat-thinking" class="hidden"><span class="spinner"></span></span>
  </div>
</div>

<!-- ===== MAIN SCHEDULE TABLE ===== -->
<div id="main-area" class="p-3">
  <div id="loading-msg" class="text-center text-gray-400 py-10">Loading schedule…</div>
  <div id="table-wrap" class="hidden overflow-x-auto rounded-lg shadow-sm border border-gray-200">
    <table id="schedule-table" class="w-full text-base bg-white">
      <thead class="bg-gray-100 text-gray-600 text-sm uppercase tracking-wide border-b">
        <tr>
          <th class="px-4 py-3 text-left font-semibold cursor-pointer select-none" onclick="sortBy('date')" title="Sort by date">Date <span id="sort-date" class="text-gray-400">↕</span></th>
          <th class="px-4 py-3 text-left font-semibold">Player(s)</th>
          <th class="px-4 py-3 text-left font-semibold">Division / Team</th>
          <th class="px-4 py-3 text-left font-semibold">Opponent</th>
          <th class="px-4 py-3 text-left font-semibold">Time</th>
          <th class="px-4 py-3 text-left font-semibold">Location</th>
        </tr>
      </thead>
      <tbody id="schedule-tbody"></tbody>
    </table>
  </div>
  <p id="no-results" class="hidden text-center text-gray-400 py-10">No games match the current filters.</p>
</div>

<!-- ===== APP LOGIC ===== -->
<script>
// ---------- CONFIG ----------
const PLAYER_COLORS = [
  {bg:'#dbeafe',text:'#1e40af',dot:'#3b82f6'},   // blue
  {bg:'#dcfce7',text:'#166534',dot:'#16a34a'},   // green
  {bg:'#fef3c7',text:'#92400e',dot:'#d97706'},   // amber
  {bg:'#f3e8ff',text:'#6b21a8',dot:'#9333ea'},   // purple
  {bg:'#fce7f3',text:'#9d174d',dot:'#ec4899'},   // pink
  {bg:'#ffedd5',text:'#7c2d12',dot:'#ea580c'},   // orange
  {bg:'#ccfbf1',text:'#134e4a',dot:'#0d9488'},   // teal
  {bg:'#e0e7ff',text:'#312e81',dot:'#6366f1'},   // indigo
  {bg:'#fef2f2',text:'#7f1d1d',dot:'#ef4444'},   // red
  {bg:'#ecfdf5',text:'#14532d',dot:'#22c55e'},   // emerald
  {bg:'#fff7ed',text:'#7c2d12',dot:'#f97316'},   // light orange
  {bg:'#eff6ff',text:'#1e3a8a',dot:'#2563eb'},   // light blue
];

let allData = [];
let filteredData = [];
let colorMap = {};
let colorIdx = 0;
let activePlayers = new Set();
let sortDir = 1; // 1=asc, -1=desc
let chatOpen = false;
let chatHistory = [];
let usingLiveData = false;

// ---------- INIT ----------
async function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date-from').value = today;

  try {
    const resp = await fetch(SHEETS_URL, { signal: AbortSignal.timeout(5000) });
    const text = await resp.text();
    if (!text.trimStart().startsWith('<') && text.includes(',')) {
      allData = parseCSV(text);
      usingLiveData = true;
    } else { throw new Error('not csv'); }
  } catch(e) {
    allData = parseCSV(EMBEDDED_CSV);
  }

  allData = allData.filter(r => r.Player || r['Player Name']);
  // normalize "Player Name" -> "Player"
  allData = allData.map(r => {
    if (!r.Player && r['Player Name']) r.Player = r['Player Name'];
    return r;
  }).filter(r => r.Player && r.Date);

  setBadge();
  buildColorMap();
  buildPlayerFilters();
  applyFilters();
  document.getElementById('loading-msg').classList.add('hidden');
  document.getElementById('table-wrap').classList.remove('hidden');
  document.getElementById('date-from').addEventListener('change', applyFilters);
  document.getElementById('date-to').addEventListener('change', applyFilters);
}

function setBadge() {
  const badge = document.getElementById('data-badge');
  if (usingLiveData) {
    badge.textContent = '🔴 Live (Google Sheets)';
    badge.className = 'text-xs px-2 py-1 rounded-full bg-green-700 text-green-100';
  } else {
    badge.textContent = '📦 Embedded data';
    badge.className = 'text-xs px-2 py-1 rounded-full bg-blue-800 text-blue-200 border border-blue-700';
  }
}

// ---------- CSV / DATA ----------
function parseCSV(text) {
  const result = Papa.parse(text.trim(), { header: true, skipEmptyLines: true });
  return result.data;
}

function getIndividualPlayers(playerCell) {
  if (!playerCell) return [];
  return playerCell.split(';').map(s => s.trim()).filter(Boolean);
}

function buildColorMap() {
  // Assign a color per unique "player group" (as they appear in data)
  const groups = [...new Set(allData.map(r => r.Player).filter(Boolean))];
  groups.forEach(g => {
    if (!colorMap[g]) {
      colorMap[g] = PLAYER_COLORS[colorIdx % PLAYER_COLORS.length];
      colorIdx++;
    }
  });
}

function dateToISOStr(dateStr) {
  // e.g. "5/23/2026" -> "2026-05-23"
  if (!dateStr) return '';
  const p = dateStr.split('/');
  if (p.length !== 3) return dateStr;
  return `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
}

function formatDateDisplay(dateStr, dayStr) {
  if (!dateStr) return '';
  const iso = dateToISOStr(dateStr);
  const d = new Date(iso + 'T12:00:00');
  if (isNaN(d)) return dateStr;
  const mon = d.toLocaleString('en-US', {month:'short'});
  const dayNum = d.getDate();
  return `<span class="font-semibold">${dayStr || ''}</span> <span class="text-gray-600">${mon} ${dayNum}</span>`;
}

// ---------- FILTERS ----------
function getPlayerGrade(name) {
  const m = name.match(/\((GC|\d+)\)\s*$/);
  return m ? m[1] : 'other';
}
function gradeOrder(g) {
  return g === 'GC' ? 0 : g === '9' ? 1 : g === '8' ? 2 : g === '7' ? 3 : 99;
}

function buildPlayerFilters() {
  const container = document.getElementById('player-filters');
  container.innerHTML = '';
  const individuals = new Set();
  allData.forEach(r => getIndividualPlayers(r.Player).forEach(p => individuals.add(p)));

  const sorted = [...individuals].sort((a, b) => {
    const diff = gradeOrder(getPlayerGrade(a)) - gradeOrder(getPlayerGrade(b));
    return diff !== 0 ? diff : a.localeCompare(b);
  });

  let currentGrade = null;
  sorted.forEach(player => {
    const grade = getPlayerGrade(player);
    if (grade !== currentGrade) {
      currentGrade = grade;
      const label = document.createElement('span');
      label.className = 'text-xs font-bold text-gray-400 uppercase tracking-wider self-center mx-1';
      label.textContent = grade === 'GC' ? 'GC' : `Grade ${grade}`;
      container.appendChild(label);
    }
    const group = allData.find(r => getIndividualPlayers(r.Player).includes(player))?.Player || player;
    const c = colorMap[group] || PLAYER_COLORS[0];
    const btn = document.createElement('button');
    btn.dataset.player = player;
    btn.className = 'player-filter-btn text-sm px-2.5 py-0.5 rounded-full border transition-all';
    btn.style.cssText = `background:${c.bg};color:${c.text};border-color:${c.dot};`;
    btn.textContent = player;
    btn.onclick = () => togglePlayerFilter(player, btn);
    container.appendChild(btn);
  });
}

function togglePlayerFilter(player, btn) {
  if (activePlayers.has(player)) {
    activePlayers.delete(player);
    btn.style.opacity = '1';
    btn.style.boxShadow = '';
    btn.style.fontWeight = '';
  } else {
    activePlayers.add(player);
    btn.style.opacity = '1';
    btn.style.boxShadow = '0 0 0 2px currentColor';
    btn.style.fontWeight = '700';
  }
  applyFilters();
}

function clearPlayerFilter() {
  activePlayers.clear();
  document.querySelectorAll('.player-filter-btn').forEach(b => {
    b.style.boxShadow = '';
    b.style.fontWeight = '';
  });
  applyFilters();
}

function clearDateFilter() {
  document.getElementById('date-from').value = '';
  document.getElementById('date-to').value = '';
  applyFilters();
}

function applyFilters() {
  const fromVal = document.getElementById('date-from').value; // YYYY-MM-DD
  const toVal = document.getElementById('date-to').value;

  filteredData = allData.filter(row => {
    const iso = dateToISOStr(row.Date);
    if (fromVal && iso < fromVal) return false;
    if (toVal && iso > toVal) return false;
    if (activePlayers.size > 0) {
      const players = getIndividualPlayers(row.Player);
      if (!players.some(p => activePlayers.has(p))) return false;
    }
    return true;
  });

  // Sort by date asc by default
  filteredData.sort((a,b) => {
    const diff = dateToISOStr(a.Date).localeCompare(dateToISOStr(b.Date));
    return diff * sortDir;
  });

  renderTable();
}

function sortBy(field) {
  if (field === 'date') {
    sortDir *= -1;
    const icon = document.getElementById('sort-date');
    icon.textContent = sortDir === 1 ? '↑' : '↓';
    filteredData.sort((a,b) => dateToISOStr(a.Date).localeCompare(dateToISOStr(b.Date)) * sortDir);
    renderTable();
  }
}

// ---------- RENDER TABLE ----------
function makeMapLink(location) {
  if (!location) return '';
  const query = encodeURIComponent(location);
  return `<a href="https://www.google.com/maps/search/?api=1&query=${query}" target="_blank" rel="noopener" class="location-link" title="Open in Google Maps">📍 ${escHtml(location)}</a>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTable() {
  const tbody = document.getElementById('schedule-tbody');
  const noResults = document.getElementById('no-results');
  const rowCount = document.getElementById('row-count');

  rowCount.textContent = filteredData.length + ' game' + (filteredData.length !== 1 ? 's' : '');

  if (filteredData.length === 0) {
    tbody.innerHTML = '';
    noResults.classList.remove('hidden');
    document.getElementById('table-wrap').classList.add('hidden');
    return;
  }

  noResults.classList.add('hidden');
  document.getElementById('table-wrap').classList.remove('hidden');

  let lastDate = null;
  const rows = filteredData.map((row, i) => {
    const c = colorMap[row.Player] || PLAYER_COLORS[0];
    const isNewDate = row.Date !== lastDate;
    lastDate = row.Date;
    const borderTop = isNewDate && i > 0 ? 'border-t-2 border-gray-200' : '';

    const locHtml = row.Location ? makeMapLink(row.Location) : '<span class="text-gray-400">—</span>';
    const timeHtml = row.Time ? `<span class="font-mono">${escHtml(row.Time)}</span>` : '<span class="text-gray-400">—</span>';
    const haDir = row['Home/Away'] ? `<span class="text-sm text-gray-400 ml-1">${row['Home/Away']==='Home'?'🏠':'✈️'}</span>` : '';

    const playerChips = getIndividualPlayers(row.Player).map(p => {
      const gc = allData.find(r => getIndividualPlayers(r.Player).includes(p))?.Player || p;
      const pc = colorMap[gc] || PLAYER_COLORS[0];
      return `<span class="inline-block text-sm px-2 py-0.5 rounded-full font-medium mr-0.5 mb-0.5" style="background:${pc.bg};color:${pc.text};">${escHtml(p)}</span>`;
    }).join('');

    return `<tr class="${borderTop} hover:bg-yellow-50 transition-colors">
      <td class="px-4 py-3 whitespace-nowrap" style="border-left:3px solid ${c.dot}">${formatDateDisplay(row.Date, row.Day)}</td>
      <td class="px-4 py-3" style="max-width:160px">${playerChips}</td>
      <td class="px-4 py-3"><span class="text-gray-500 text-sm">${escHtml(row.Division||'')}</span><br><span class="font-medium text-gray-800">${escHtml(row.Team||'')}</span></td>
      <td class="px-4 py-3 font-medium text-gray-800">${escHtml(row.Opponent||'')}${haDir}</td>
      <td class="px-4 py-3 whitespace-nowrap">${timeHtml}</td>
      <td class="px-4 py-3">${locHtml}</td>
    </tr>`;
  });

  tbody.innerHTML = rows.join('');
}

// ---------- CHAT ----------
let historyVisible = true;

function toggleChatHistory() {
  historyVisible = !historyVisible;
  const msgs = document.getElementById('chat-messages');
  const icon = document.getElementById('chat-toggle-icon');
  msgs.style.display = historyVisible ? '' : 'none';
  icon.textContent = historyVisible ? '▲ hide' : '▼ show';
}

function exampleQ(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  sendQuestion();
}

async function sendQuestion() {
  const input = document.getElementById('chat-input');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';

  appendMessage('user', question);
  setThinking(true);

  const today = new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  try {
    const resp = await fetch('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        question,
        scheduleCSV: EMBEDDED_CSV,
        today
      })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    appendMessage('assistant', data.answer);
  } catch(e) {
    appendMessage('assistant', `⚠️ Error: ${e.message}. Make sure the Vercel function is deployed with ANTHROPIC_API_KEY set.`);
  } finally {
    setThinking(false);
  }
}

function setThinking(on) {
  document.getElementById('chat-thinking').classList.toggle('hidden', !on);
  const btn = document.querySelector('#chat-panel button[onclick="sendQuestion()"]');
  if (btn) btn.disabled = on;
}

function appendMessage(role, text) {
  const wrap = document.getElementById('chat-messages-wrap');
  const msgs = document.getElementById('chat-messages');
  const isUser = role === 'user';

  // Show the history panel on first message
  wrap.classList.remove('hidden');

  const div = document.createElement('div');
  div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

  const bubble = document.createElement('div');
  bubble.className = isUser
    ? 'bg-blue-700 text-white rounded-2xl rounded-br-sm px-3 py-2 max-w-lg text-sm'
    : 'bg-white border border-gray-200 text-gray-800 rounded-2xl rounded-bl-sm px-3 py-2 max-w-2xl text-sm prose shadow-sm';

  if (isUser) {
    bubble.textContent = text;
  } else {
    bubble.innerHTML = marked.parse(text);
  }

  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ---------- START ----------
init();
</script>
